<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="990" viewBox="0 0 780 990" role="img" aria-labelledby="title desc">
  <title id="title">Celdra Gremlin Roster V102</title>
  <desc id="desc">Standalone vector roster for BYTE, HEX, CACHE, LOOP, PING, PATCH, ROOT, NULL, and GLITCH.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity=".55"/></filter>
    <style>
      .o{stroke:#05080d;stroke-width:5;stroke-linejoin:round;stroke-linecap:round}
      .t{font:700 25px 'DejaVu Sans Mono',monospace;text-anchor:middle;paint-order:stroke;stroke:#07101a;stroke-width:2.5px}
      .r{font:17px 'DejaVu Sans',sans-serif;text-anchor:middle;fill:#d6e3f1}
      .eye{fill:#fff;stroke:#05080d;stroke-width:3}
      .pupil{fill:#172131}
      .horn{fill:#f2d8a6;stroke:#05080d;stroke-width:5}
    </style>
    <g id="dragon">
      <path class="o" d="M-45 38 L-94 -10 L-82 58 Z" fill="var(--dark)"/><path class="o" d="M45 38 L94 -10 L82 58 Z" fill="var(--dark)"/>
      <ellipse class="o" cx="0" cy="55" rx="76" ry="61" fill="var(--dark)"/><ellipse cx="0" cy="55" rx="66" ry="53" fill="var(--accent)"/>
      <ellipse class="o" cx="0" cy="70" rx="31" ry="37" fill="var(--light)"/>
      <ellipse class="o" cx="-48" cy="103" rx="23" ry="13" fill="var(--accent)"/><ellipse class="o" cx="48" cy="103" rx="23" ry="13" fill="var(--accent)"/>
      <ellipse class="o" cx="0" cy="-20" rx="65" ry="52" fill="var(--dark)"/><ellipse cx="0" cy="-20" rx="56" ry="44" fill="var(--accent)"/>
      <path class="horn" d="M-40 -48 L-61 -86 L-18 -65 Z"/><path class="horn" d="M40 -48 L61 -86 L18 -65 Z"/>
      <ellipse class="o" cx="0" cy="-4" rx="34" ry="18" fill="var(--light)"/>
      <ellipse class="eye" cx="-27" cy="-29" rx="13" ry="16"/><ellipse class="eye" cx="27" cy="-29" rx="13" ry="16"/>
      <ellipse class="pupil" cx="-27" cy="-27" rx="5" ry="8"/><ellipse class="pupil" cx="27" cy="-27" rx="5" ry="8"/>
      <circle cx="-25" cy="-31" r="2.5" fill="#fff"/><circle cx="29" cy="-31" r="2.5" fill="#fff"/>
      <path d="M-9 7 Q0 14 9 7" fill="none" stroke="#121019" stroke-width="4" stroke-linecap="round"/>
      <path d="M-55 49 L-83 70 M55 49 L83 70" fill="none" stroke="var(--dark)" stroke-width="12" stroke-linecap="round"/>
      <circle cx="-83" cy="70" r="7" fill="var(--light)" stroke="#05080d" stroke-width="3"/><circle cx="83" cy="70" r="7" fill="var(--light)" stroke="#05080d" stroke-width="3"/>
    </g>
