  <g transform="translate(130 450)" style="--accent:#ff78bc;--dark:#781b51;--light:#ffd0e9" filter="url(#shadow)"><g transform="scale(.88 .92)"><use href="#dragon"/></g><path class="o" d="M-3 -87 L-39 -101 L-35 -70 Z" fill="#ff78bc"/><path class="o" d="M3 -87 L39 -101 L35 -70 Z" fill="#ff78bc"/><circle cx="0" cy="-89" r="11" fill="#ffd0e9" stroke="#5c163f" stroke-width="3"/><path d="M58 58 C112 76 105 16 67 27" fill="none" stroke="#781b51" stroke-width="14" stroke-linecap="round"/><path d="M58 58 C112 76 105 16 67 27" fill="none" stroke="#ff78bc" stroke-width="5"/></g><text class="t" x="130" y="600" fill="#ffd0e9">LOOP</text><text class="r" x="130" y="635">route repeater</text>

  <g transform="translate(390 450)" style="--accent:#63f0c8;--dark:#0b6550;--light:#caffef" filter="url(#shadow)"><g transform="scale(.9 1.08)"><use href="#dragon"/></g><path d="M-47 88 l-10 8 10 8 -10 8 M47 88 l10 8 -10 8 10 8" stroke="#caffef" stroke-width="4" fill="none"/><rect class="o" x="-39" y="51" width="78" height="16" rx="4" fill="#062d25"/><rect x="-35" y="55" width="50" height="8" fill="#caffef"/></g><text class="t" x="390" y="600" fill="#caffef">PING</text><text class="r" x="390" y="635">progress-bar percussion</text>

  <g transform="translate(650 450)" style="--accent:#ffe06e;--dark:#7b5b00;--light:#fff6c3" filter="url(#shadow)"><g transform="scale(1.12 .96)"><use href="#dragon"/></g><rect class="o" x="14" y="-55" width="43" height="14" fill="#fff6c3"/><path d="M-72 77 L-40 28" stroke="#d9e1e8" stroke-width="9"/><path d="M-48 20 A17 17 0 1 1 -28 38" fill="none" stroke="#d9e1e8" stroke-width="7"/></g><text class="t" x="650" y="600" fill="#fff6c3">PATCH</text><text class="r" x="650" y="635">unauthorized fixer</text>

  <g transform="translate(130 780)" style="--accent:#4c9cff;--dark:#173b79;--light:#c8ddff" filter="url(#shadow)"><g transform="scale(1.08 1.03)"><use href="#dragon"/></g><path class="o" d="M-34 -82 L-27 -108 L-7 -90 L6 -112 L27 -90 L35 -108 L38 -82 Z" fill="#ffe06e"/><path class="o" d="M-65 30 L-89 101 L4 86 Z" fill="#173b79"/></g><text class="t" x="130" y="930" fill="#c8ddff">ROOT</text><text class="r" x="130" y="965">party administrator</text>

  <g transform="translate(390 780)" style="--accent:#d4e3f1;--dark:#4d5966;--light:#ffffff" filter="url(#shadow)"><g transform="scale(.82 .85)"><use href="#dragon"/></g><ellipse cx="0" cy="-20" rx="65" ry="57" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="7 7"/><text x="66" y="76" font-family="monospace" font-size="34" font-weight="700" fill="#fff">?</text></g><text class="t" x="390" y="930" fill="#fff">NULL</text><text class="r" x="390" y="965">vanishing process</text>

  <g transform="translate(650 780)" style="--accent:#ff596f;--dark:#781522;--light:#ffd1d7" filter="url(#shadow)"><g transform="scale(.96 1.02)"><use href="#dragon"/></g><path d="M18 -70 L43 -116" stroke="#ffd1d7" stroke-width="5"/><circle cx="47" cy="-122" r="8" fill="#ff596f" stroke="#05080d" stroke-width="3"/><rect x="-82" y="24" width="50" height="7" fill="#ffd1d7"/><rect x="-82" y="42" width="70" height="7" fill="#ff596f"/><rect x="-82" y="60" width="38" height="7" fill="#ffd1d7"/><path d="M-66 -62 H77" stroke="#ff8a98" stroke-width="6" stroke-dasharray="20 8"/><path d="M58 55 L112 36 L82 78 L124 72" fill="none" stroke="#781522" stroke-width="14" stroke-linecap="round"/><path d="M58 55 L112 36 L82 78 L124 72" fill="none" stroke="#ff596f" stroke-width="5"/></g><text class="t" x="650" y="930" fill="#ffd1d7">GLITCH</text><text class="r" x="650" y="965">status duplicator</text>
</svg>
