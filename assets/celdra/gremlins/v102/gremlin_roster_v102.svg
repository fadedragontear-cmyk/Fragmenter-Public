  <g transform="translate(130 120)" style="--accent:#64d8ff;--dark:#07506a;--light:#bdf4ff" filter="url(#shadow)"><g transform="scale(1.14 .94)"><use href="#dragon"/></g><path class="o" d="M60 -2 H107 V25 H87 l-8 10 -2-10 H60 Z" fill="#f7fcff"/><path d="M91 -5 h19 v16 l-9-7 -10 7z" fill="#10151d"/></g><text class="t" x="130" y="270" fill="#bdf4ff">BYTE</text><text class="r" x="130" y="305">tooltip eater</text>

  <g transform="translate(390 120)" style="--accent:#b87cff;--dark:#4b246f;--light:#ead7ff" filter="url(#shadow)"><g transform="scale(.82 1.18)"><use href="#dragon"/></g><text x="0" y="75" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#4b246f">0x</text><path d="M65 24 h20 M65 46 h31 M65 68 h20" stroke="#ead7ff" stroke-width="4"/></g><text class="t" x="390" y="270" fill="#ead7ff">HEX</text><text class="r" x="390" y="305">offset tracker</text>

